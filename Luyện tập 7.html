<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div style="text-align: center;  justify-content: center; align-items: center; height: 100vh;">
        <header>
            <h1 style="background-color: rgb(255, 100, 30); color: white;">SỞ THÍCH CỦA BẠN</h1>
        </header>
        <main>
            <form action="" method="post">
                <div>
                    <label for="name" style="color: blue;">Họ và Tên:</label>
                    <input type="text" name="name">
                </div>
                <div>
                    <label for="email" style="color: blue;">Email:</label>
                    <input type="email" name="email">
                </div>
            </form>

            <form>
                <form>
                    <div>
                        <figure>
                            <label for="hobby" style="color: blue;">Sở thích</label>

                            <input type="checkbox" name="hobby" value="Thể thao">
                            <label for="hobby" style="color: rgb(222, 137, 25);">Thể thao</label>
                            <input type="checkbox" name="hobby" value="Âm nhạc">
                            <label for="hobby" style="color: rgb(222, 137, 25);">Âm nhạc</label>
                            <input type="checkbox" name="hobby" value="Đọc sách">
                            <label for="hobby" style="color: rgb(222, 137, 25);">Đọc sách</label>
                    </div>
                </form>
                <div>
                    <form>
                        <input type="checkbox" name="hobby" value="Lướt web">
                        <label for="hobby" style="color: rgb(222, 137, 25);">Lướt web</label>
                        <input type="checkbox" name="hobby" value="Chơi game">
                        <label for="hobby" style="color: rgb(222, 137, 25);">Chơi game</label>
                        <input type="checkbox" name="hobby" value="Điện ảnh">
                        <label for="hobby" style="color: rgb(222, 137, 25);">Điện ảnh</label>
                </div>
                <div>
                    <input type="checkbox" name="hobby" value="Du lịch">
                    <label for="hobby" style="color: rgb(222, 137, 25);">Du lịch</label>
                </div>
                </figure>

            </form>
        </main>
        <button>Gửi thông tin</button> <button>Nhập lại</button>
    </div>
</body>

</html>
